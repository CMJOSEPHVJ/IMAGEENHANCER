<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IMAGE ENHANCER // NEXUS</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a28;
      --surface3: #222236;
      --accent: #00e5ff;
      --accent2: #7c3aed;
      --accent3: #f72585;
      --accent4: #00f5d4;
      --text: #e0e0f0;
      --text2: #a0a0c0;
      --text3: #6b6b8a;
      --border: #252540;
      --glow-cyan: 0 0 30px rgba(0, 229, 255, 0.3);
      --radius: 20px;
      --radius-sm: 12px;
      --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow-y: auto;
    }

    .bg-grid {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridShift 20s linear infinite;
    }
    @keyframes gridShift {
      0% { background-position: 0 0, 0 0; }
      100% { background-position: 40px 40px, 40px 40px; }
    }

    .app-container {
      position: relative; z-index: 1;
      width: 100%; max-width: 700px;
      padding: 24px 20px 40px;
      display: flex; flex-direction: column; gap: 24px;
    }

    .header { text-align: center; }
    .logo {
      font-size: 2rem; font-weight: 800; letter-spacing: 2px;
      background: linear-gradient(135deg, var(--accent), var(--accent2), var(--accent3));
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 25px rgba(0,229,255,0.5));
    }
    .subtitle {
      font-size: 0.7rem; letter-spacing: 3px; color: var(--text3);
      margin-top: 4px; text-transform: uppercase;
    }

    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px;
      backdrop-filter: blur(20px); position: relative;
    }
    .card::after {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,229,255,0.5), transparent);
    }

    .drop-zone {
      border: 2px dashed var(--border); border-radius: var(--radius-sm);
      padding: 32px 20px; text-align: center;
      transition: var(--transition); cursor: pointer;
      background: rgba(255,255,255,0.01);
      margin-bottom: 10px;
    }
    .drop-zone.drag-over {
      border-color: var(--accent); background: rgba(0,229,255,0.05);
      box-shadow: var(--glow-cyan);
    }
    .drop-zone .icon { font-size: 2.8rem; margin-bottom: 8px; opacity: 0.7; }
    .drop-zone p { color: var(--text2); font-weight: 500; }
    .file-label { color: var(--accent); font-weight: 700; cursor: pointer; text-decoration: underline; }
    #fileInput { display: none; }

    .preview-area {
      display: flex; justify-content: center; align-items: center;
      min-height: 280px; background: var(--surface2);
      border-radius: var(--radius-sm); overflow: hidden;
      margin: 15px 0; border: 1px solid var(--border);
      position: relative;
    }
    .preview-area img, .preview-area canvas {
      max-width: 100%; max-height: 380px; object-fit: contain;
      display: block;
    }

    .slider-group {
      display: flex; flex-direction: column; gap: 14px;
    }
    .slider-item {
      display: flex; align-items: center; gap: 12px;
    }
    .slider-item label {
      width: 90px; font-size: 0.8rem; font-weight: 600;
      letter-spacing: 0.5px; color: var(--text2);
    }
    input[type="range"] {
      -webkit-appearance: none; flex: 1; height: 5px;
      background: var(--surface3); border-radius: 5px; outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 18px; height: 18px;
      background: var(--accent); border-radius: 50%;
      box-shadow: 0 0 12px var(--accent); cursor: pointer;
    }
    .slider-value {
      width: 42px; text-align: right; font-size: 0.75rem; color: var(--text2);
    }

    .btn-row {
      display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px;
    }
    .btn {
      padding: 10px 18px; border-radius: 30px; border: none;
      cursor: pointer; font-weight: 700; font-family: inherit;
      font-size: 0.8rem; letter-spacing: 1px; transition: var(--transition);
      text-transform: uppercase; display: inline-flex; align-items: center; gap: 6px;
      background: transparent; border: 1px solid var(--border); color: var(--text2);
    }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #000; border: none; box-shadow: var(--glow-cyan);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 0 40px rgba(0,229,255,0.6); }
    .btn:active { transform: scale(0.95); }

    .toast {
      position: fixed; bottom: 30px; left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--surface3); border: 1px solid var(--accent);
      color: var(--text); padding: 12px 24px; border-radius: 30px;
      font-weight: 600; letter-spacing: 1px; z-index: 100;
      transition: transform 0.35s ease; pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 500px) {
      .slider-item { flex-wrap: wrap; }
      .slider-item label { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="app-container">
    <div class="header">
      <div class="logo">IMAGE ENHANCER</div>
      <div class="subtitle">NEXUS // VISUAL ENGINE</div>
    </div>

    <!-- Upload Card -->
    <div class="card">
      <div class="drop-zone" id="dropZone">
        <div class="icon">🖼️</div>
        <p>Drop image here or <span class="file-label" id="fileLabel">browse</span></p>
        <input type="file" id="fileInput" accept="image/*">
      </div>
      <div id="editorPanel" style="display: none;">
        <div class="preview-area" id="previewContainer">
          <canvas id="previewCanvas"></canvas>
        </div>
        <div class="slider-group">
          <div class="slider-item">
            <label>Brightness</label>
            <input type="range" id="brightness" min="-100" max="100" value="0" step="1">
            <span class="slider-value" id="brightVal">0</span>
          </div>
          <div class="slider-item">
            <label>Contrast</label>
            <input type="range" id="contrast" min="-100" max="100" value="0" step="1">
            <span class="slider-value" id="contrastVal">0</span>
          </div>
          <div class="slider-item">
            <label>Saturation</label>
            <input type="range" id="saturation" min="-100" max="100" value="0" step="1">
            <span class="slider-value" id="saturVal">0</span>
          </div>
          <div class="slider-item">
            <label>Blur</label>
            <input type="range" id="blur" min="0" max="20" value="0" step="0.5">
            <span class="slider-value" id="blurVal">0</span>
          </div>
          <div class="slider-item">
            <label>Sharpness</label>
            <input type="range" id="sharpen" min="0" max="100" value="0" step="1">
            <span class="slider-value" id="sharpenVal">0</span>
          </div>
        </div>
        <div class="btn-row">
          <button class="btn" id="rotateLeftBtn">↺ Rotate Left</button>
          <button class="btn" id="rotateRightBtn">↻ Rotate Right</button>
          <button class="btn" id="flipHBtn">⇄ Flip H</button>
          <button class="btn" id="flipVBtn">⇅ Flip V</button>
          <button class="btn" id="resetBtn">↺ Reset</button>
          <button class="btn btn-primary" id="downloadBtn">⬇ Download JPG</button>
        </div>
      </div>
    </div>
  </div>
  <div class="toast" id="toast"></div>

  <script>
    (function() {
      // DOM elements
      const dropZone = document.getElementById('dropZone');
      const fileInput = document.getElementById('fileInput');
      const fileLabel = document.getElementById('fileLabel');
      const editorPanel = document.getElementById('editorPanel');
      const previewCanvas = document.getElementById('previewCanvas');
      const previewContainer = document.getElementById('previewContainer');
      const toast = document.getElementById('toast');

      // Sliders
      const brightnessSlider = document.getElementById('brightness');
      const contrastSlider = document.getElementById('contrast');
      const saturationSlider = document.getElementById('saturation');
      const blurSlider = document.getElementById('blur');
      const sharpenSlider = document.getElementById('sharpen');
      const brightVal = document.getElementById('brightVal');
      const contrastVal = document.getElementById('contrastVal');
      const saturVal = document.getElementById('saturVal');
      const blurVal = document.getElementById('blurVal');
      const sharpenVal = document.getElementById('sharpenVal');

      // Buttons
      const rotateLeftBtn = document.getElementById('rotateLeftBtn');
      const rotateRightBtn = document.getElementById('rotateRightBtn');
      const flipHBtn = document.getElementById('flipHBtn');
      const flipVBtn = document.getElementById('flipVBtn');
      const resetBtn = document.getElementById('resetBtn');
      const downloadBtn = document.getElementById('downloadBtn');

      // State
      let originalImage = null;        // Image element
      let currentAngle = 0;           // 0, 90, 180, 270
      let flipH = false;
      let flipV = false;
      let originalWidth, originalHeight;

      // Toast
      function showToast(msg) {
        toast.textContent = msg;
        toast.classList.add('show');
        clearTimeout(toast._timeout);
        toast._timeout = setTimeout(() => toast.classList.remove('show'), 2500);
      }

      // Load image from file
      function loadImage(file) {
        if (!file.type.startsWith('image/')) {
          showToast('⚠️ Please select an image file');
          return;
        }
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            originalImage = img;
            originalWidth = img.width;
            originalHeight = img.height;
            // Reset transformations
            currentAngle = 0;
            flipH = false;
            flipV = false;
            resetSliders();
            applyAll();
            editorPanel.style.display = 'block';
            showToast('✅ Image loaded');
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      }

      // Reset sliders to neutral
      function resetSliders() {
        brightnessSlider.value = 0;
        contrastSlider.value = 0;
        saturationSlider.value = 0;
        blurSlider.value = 0;
        sharpenSlider.value = 0;
        updateSliderLabels();
      }

      function updateSliderLabels() {
        brightVal.textContent = brightnessSlider.value;
        contrastVal.textContent = contrastSlider.value;
        saturVal.textContent = saturationSlider.value;
        blurVal.textContent = blurSlider.value;
        sharpenVal.textContent = sharpenSlider.value;
      }

      // --- Core rendering ---
      function applyAll() {
        if (!originalImage) return;
        const canvas = previewCanvas;
        const ctx = canvas.getContext('2d');

        // Determine rotated dimensions
        let w = originalWidth;
        let h = originalHeight;
        if (currentAngle % 180 !== 0) {
          w = originalHeight;
          h = originalWidth;
        }

        canvas.width = w;
        canvas.height = h;

        // Apply transformations
        ctx.save();
        ctx.clearRect(0, 0, w, h);

        // Translate to center for rotation
        ctx.translate(w / 2, h / 2);
        ctx.rotate((currentAngle * Math.PI) / 180);
        ctx.scale(flipH ? -1 : 1, flipV ? -1 : 1);

        // Draw image centered
        ctx.drawImage(originalImage, -originalWidth / 2, -originalHeight / 2);
        ctx.restore();

        // Apply filters: brightness, contrast, saturation, blur, sharpen
        // We'll use getImageData / putImageData for pixel manipulation
        if (brightnessSlider.value != 0 || contrastSlider.value != 0 ||
            saturationSlider.value != 0 || blurSlider.value > 0 ||
            sharpenSlider.value > 0) {
          applyFilters(canvas);
        }
      }

      function applyFilters(canvas) {
        const ctx = canvas.getContext('2d');
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;

        const brightness = parseInt(brightnessSlider.value);
        const contrast = parseInt(contrastSlider.value);
        const saturation = parseInt(saturationSlider.value);
        const blurAmount = parseFloat(blurSlider.value);
        const sharpenAmount = parseInt(sharpenSlider.value);

        // 1. Pixel adjustments (brightness, contrast, saturation)
        if (brightness !== 0 || contrast !== 0 || saturation !== 0) {
          const contrastFactor = (259 * (contrast + 255)) / (255 * (259 - contrast));
          for (let i = 0; i < data.length; i += 4) {
            let r = data[i];
            let g = data[i + 1];
            let b = data[i + 2];

            // Brightness
            r += brightness;
            g += brightness;
            b += brightness;

            // Contrast
            r = (r - 128) * contrastFactor + 128;
            g = (g - 128) * contrastFactor + 128;
            b = (b - 128) * contrastFactor + 128;

            // Saturation (luminance based)
            if (saturation !== 0) {
              const gray = 0.3 * r + 0.59 * g + 0.11 * b;
              r = gray + (saturation / 100) * (r - gray);
              g = gray + (saturation / 100) * (g - gray);
              b = gray + (saturation / 100) * (b - gray);
            }

            // Clamp
            data[i] = Math.min(255, Math.max(0, r));
            data[i + 1] = Math.min(255, Math.max(0, g));
            data[i + 2] = Math.min(255, Math.max(0, b));
          }
          ctx.putImageData(imageData, 0, 0);
        }

        // 2. Blur (simple box blur via canvas filter fallback, but we can do a quick blur)
        if (blurAmount > 0) {
          ctx.save();
          ctx.filter = `blur(${blurAmount}px)`;
          // Redraw current canvas onto itself with blur
          const tempCanvas = document.createElement('canvas');
          tempCanvas.width = canvas.width;
          tempCanvas.height = canvas.height;
          const tempCtx = tempCanvas.getContext('2d');
          tempCtx.drawImage(canvas, 0, 0);
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(tempCanvas, 0, 0);
          ctx.restore();
        }

        // 3. Sharpen (unsharp mask: convolve)
        if (sharpenAmount > 0) {
          sharpenCanvas(canvas, sharpenAmount / 100);
        }
      }

      function sharpenCanvas(canvas, intensity) {
        const ctx = canvas.getContext('2d');
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;
        const w = canvas.width;
        const h = canvas.height;
        const copy = new Uint8ClampedArray(data);

        // Kernel: amount of sharpen
        const factor = intensity * 2.5; // 0 to 2.5
        const kernel = [
          0, -factor, 0,
          -factor, 4 * factor + 1, -factor,
          0, -factor, 0
        ];

        for (let y = 1; y < h - 1; y++) {
          for (let x = 1; x < w - 1; x++) {
            const idx = (y * w + x) * 4;
            for (let c = 0; c < 3; c++) {
              let sum = 0;
              // apply kernel
              sum += kernel[0] * copy[((y-1)*w + (x-1))*4 + c];
              sum += kernel[1] * copy[((y-1)*w + x)*4 + c];
              sum += kernel[2] * copy[((y-1)*w + (x+1))*4 + c];
              sum += kernel[3] * copy[(y*w + (x-1))*4 + c];
              sum += kernel[4] * copy[(y*w + x)*4 + c];
              sum += kernel[5] * copy[(y*w + (x+1))*4 + c];
              sum += kernel[6] * copy[((y+1)*w + (x-1))*4 + c];
              sum += kernel[7] * copy[((y+1)*w + x)*4 + c];
              sum += kernel[8] * copy[((y+1)*w + (x+1))*4 + c];
              data[idx + c] = Math.min(255, Math.max(0, sum));
            }
          }
        }
        ctx.putImageData(imageData, 0, 0);
      }

      // --- Event listeners ---
      // Upload triggers
      dropZone.addEventListener('click', (e) => {
        if (e.target !== fileLabel) fileInput.click();
      });
      fileLabel.addEventListener('click', (e) => {
        e.stopPropagation();
        fileInput.click();
      });
      fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) loadImage(e.target.files[0]);
      });

      // Drag & drop
      ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(ev => {
        dropZone.addEventListener(ev, (e) => {
          e.preventDefault();
          e.stopPropagation();
        });
      });
      dropZone.addEventListener('dragenter', () => dropZone.classList.add('drag-over'));
      dropZone.addEventListener('dragover', () => dropZone.classList.add('drag-over'));
      dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
      dropZone.addEventListener('drop', (e) => {
        dropZone.classList.remove('drag-over');
        const dt = e.dataTransfer;
        if (dt.files && dt.files.length > 0) {
          loadImage(dt.files[0]);
        }
      });

      // Sliders
      [brightnessSlider, contrastSlider, saturationSlider, blurSlider, sharpenSlider].forEach(slider => {
        slider.addEventListener('input', () => {
          updateSliderLabels();
          applyAll();
        });
      });

      // Rotate / Flip
      rotateLeftBtn.addEventListener('click', () => {
        currentAngle = (currentAngle - 90) % 360;
        if (currentAngle < 0) currentAngle += 360;
        applyAll();
      });
      rotateRightBtn.addEventListener('click', () => {
        currentAngle = (currentAngle + 90) % 360;
        applyAll();
      });
      flipHBtn.addEventListener('click', () => {
        flipH = !flipH;
        applyAll();
      });
      flipVBtn.addEventListener('click', () => {
        flipV = !flipV;
        applyAll();
      });
      resetBtn.addEventListener('click', () => {
        currentAngle = 0;
        flipH = false;
        flipV = false;
        resetSliders();
        applyAll();
        showToast('↺ Reset to original');
      });

      // Download
      downloadBtn.addEventListener('click', () => {
        if (!originalImage) return;
        // Ensure latest canvas state
        applyAll();
        const dataURL = previewCanvas.toDataURL('image/jpeg', 0.92);
        const link = document.createElement('a');
        link.download = 'enhanced_image.jpg';
        link.href = dataURL;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        showToast('⬇ Downloaded');
      });

      // Initial update
      updateSliderLabels();
    })();
  </script>
</body>
</html>
